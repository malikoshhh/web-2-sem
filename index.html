<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Регистрация</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #f8f8f6;
      --gray-light: #e8e8e4;
      --gray-mid: #b0b0aa;
      --gray-dark: #3a3a38;
      --border: #d0d0ca;
    }

    body {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      background: var(--white);
      color: var(--black);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }

    .page-wrapper {
      width: 100%;
      max-width: 680px;
    }

    .form-header {
      text-align: center;
      margin-bottom: 52px;
    }

    .form-header .eyebrow {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gray-mid);
      margin-bottom: 14px;
    }

    .form-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(38px, 6vw, 56px);
      line-height: 1.05;
      letter-spacing: -0.01em;
    }

    .form-header h1 em {
      font-style: italic;
      font-weight: 600;
    }

    .header-line {
      width: 48px;
      height: 1px;
      background: var(--black);
      margin: 20px auto 0;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    .field-group {
      border-bottom: 1px solid var(--border);
      padding: 28px 0;
      display: grid;
      grid-template-columns: 200px 1fr;
      align-items: start;
      gap: 20px;
    }

    .field-group:first-of-type {
      border-top: 1px solid var(--border);
    }

    label.field-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gray-mid);
      padding-top: 10px;
      line-height: 1.4;
      transition: color 0.2s;
      cursor: default;
      user-select: none;
    }

    .field-group:focus-within label.field-label {
      color: var(--black);
    }

    .field-content {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    input[type="text"],
    input[type="tel"],
    input[type="email"],
    input[type="date"],
    textarea {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 15px;
      color: var(--black);
      background: transparent;
      border: none;
      border-bottom: 1.5px solid var(--border);
      outline: none;
      padding: 8px 0;
      width: 100%;
      transition: border-color 0.25s;
      -webkit-appearance: none;
      border-radius: 0;
    }

    input[type="text"]:focus,
    input[type="tel"]:focus,
    input[type="email"]:focus,
    input[type="date"]:focus,
    textarea:focus {
      border-bottom-color: var(--black);
    }

    input::placeholder,
    textarea::placeholder {
      color: var(--gray-mid);
      font-weight: 300;
    }

    input[type="date"] {
      color: var(--gray-dark);
    }

    textarea {
      resize: vertical;
      min-height: 110px;
      line-height: 1.7;
    }

    select[multiple] {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      border: 1.5px solid var(--border);
      padding: 8px 10px;
      min-height: 140px;
      font-size: 14px;
      line-height: 1.8;
      color: var(--gray-dark);
      cursor: pointer;
      background: var(--white);
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }

    select[multiple]:focus {
      border-color: var(--black);
    }

    select[multiple] option:checked {
      background: var(--black);
      color: var(--white);
    }

    .select-hint {
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--gray-mid);
    }

    .radio-group {
      display: flex;
      gap: 28px;
      padding-top: 6px;
    }

    .radio-item {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .radio-item input[type="radio"] {
      display: none;
    }

    .radio-circle {
      width: 18px;
      height: 18px;
      border: 1.5px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s;
      flex-shrink: 0;
    }

    .radio-circle::after {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--black);
      border-radius: 50%;
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 0.2s, transform 0.2s;
    }

    .radio-item input[type="radio"]:checked + .radio-circle {
      border-color: var(--black);
    }

    .radio-item input[type="radio"]:checked + .radio-circle::after {
      opacity: 1;
      transform: scale(1);
    }

    .radio-item span {
      font-size: 14px;
      color: var(--gray-dark);
    }

    .checkbox-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      cursor: pointer;
      padding-top: 4px;
    }

    .checkbox-item input[type="checkbox"] {
      display: none;
    }

    .checkbox-box {
      width: 18px;
      height: 18px;
      border: 1.5px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s;
      margin-top: 1px;
    }

    .checkbox-box::after {
      content: '';
      width: 9px;
      height: 5px;
      border-left: 1.5px solid var(--white);
      border-bottom: 1.5px solid var(--white);
      transform: rotate(-45deg) translateY(-1px);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .checkbox-item input[type="checkbox"]:checked + .checkbox-box {
      background: var(--black);
      border-color: var(--black);
    }

    .checkbox-item input[type="checkbox"]:checked + .checkbox-box::after {
      opacity: 1;
    }

    .checkbox-item span {
      font-size: 13px;
      color: var(--gray-dark);
      line-height: 1.6;
    }

    .form-footer {
      margin-top: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .form-note {
      font-size: 11px;
      color: var(--gray-mid);
      letter-spacing: 0.04em;
      line-height: 1.6;
      max-width: 260px;
    }

    .btn-save {
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--white);
      background: var(--black);
      border: 1.5px solid var(--black);
      padding: 16px 44px;
      cursor: pointer;
      transition: background 0.25s, color 0.25s;
      white-space: nowrap;
    }

    .btn-save:hover {
      background: transparent;
      color: var(--black);
    }

    @media (max-width: 580px) {
      .field-group {
        grid-template-columns: 1fr;
        gap: 10px;
        padding: 22px 0;
      }

      label.field-label { padding-top: 0; }

      .form-footer {
        flex-direction: column;
        align-items: flex-start;
      }

      .btn-save {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>

<div class="page-wrapper">

  <header class="form-header">
    <p class="eyebrow">Анкета участника</p>
    <h1>Личные <em>данные</em></h1>
    <div class="header-line"></div>
  </header>

  <form action="/save" method="POST">

    <div class="field-group">
      <label class="field-label" for="fullname">ФИО</label>
      <div class="field-content">
        <input type="text" id="fullname" name="fullname" placeholder="Иванов Иван Иванович" required/>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label" for="phone">Телефон</label>
      <div class="field-content">
        <input type="tel" id="phone" name="phone" placeholder="+7 (___) ___-__-__"/>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label" for="email">E-mail</label>
      <div class="field-content">
        <input type="email" id="email" name="email" placeholder="example@mail.com"/>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label" for="birthdate">Дата рождения</label>
      <div class="field-content">
        <input type="date" id="birthdate" name="birthdate"/>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">Пол</label>
      <div class="field-content">
        <div class="radio-group">
          <label class="radio-item">
            <input type="radio" name="gender" value="male"/>
            <span class="radio-circle"></span>
            <span>Мужской</span>
          </label>
          <label class="radio-item">
            <input type="radio" name="gender" value="female"/>
            <span class="radio-circle"></span>
            <span>Женский</span>
          </label>
        </div>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label" for="languages">Язык<br>программирования</label>
      <div class="field-content">
        <select id="languages" name="languages" multiple>
          <option>Pascal</option>
          <option>C</option>
          <option>C++</option>
          <option>JavaScript</option>
          <option>PHP</option>
          <option>Python</option>
          <option>Java</option>
          <option>Haskell</option>
          <option>Clojure</option>
          <option>Prolog</option>
          <option>Scala</option>
          <option>Go</option>
        </select>
        <p class="select-hint">Удерживайте Ctrl / Cmd для выбора нескольких</p>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label" for="bio">Биография</label>
      <div class="field-content">
        <textarea id="bio" name="bio" placeholder="Расскажите о себе…"></textarea>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">Договор</label>
      <div class="field-content">
        <label class="checkbox-item">
          <input type="checkbox" name="contract" required/>
          <span class="checkbox-box"></span>
          <span>С контрактом ознакомлен(а) и согласен(на) с его условиями</span>
        </label>
      </div>
    </div>

    <div class="form-footer">
      <p class="form-note">Все поля должны быть заполнены корректно перед отправкой.</p>
      <button type="submit" class="btn-save">Сохранить</button>
    </div>

  </form>

</div>

</body>
</html>
